services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: images
    # No host port mapping: the api reaches the db over the internal docker
    # network on 5432. To inspect the db from your host, uncomment and pick a
    # free host port, e.g.  ports: ['5433:5432']
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d images']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      APP_BASE_URL: http://localhost:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: images
      DB_SYNCHRONIZE: 'true'
      STORAGE_DRIVER: filesystem
      STORAGE_DIR: /app/uploads
      MAX_FILE_SIZE_BYTES: '15728640'
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads

volumes:
  db_data:
  uploads_data:
